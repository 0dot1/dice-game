<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎲 幸运骰子 - Lucky Dice</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
        
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, sans-serif;
            color: white;
            overflow-x: hidden;
            position: relative;
        }
        
        /* 背景动画粒子 */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }
        
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            animation: float 15s infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }
        
        .container {
            position: relative;
            z-index: 1;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            padding-bottom: 140px;
        }
        
        /* 头部 */
        .header {
            text-align: center;
            padding: 20px 0;
        }
        
        .header h1 {
            font-size: 2.5em;
            font-weight: 800;
            background: linear-gradient(45deg, #f093fb, #f5576c, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(240,147,251,0.3);
            margin-bottom: 5px;
        }
        
        .subtitle {
            color: rgba(255,255,255,0.6);
            font-size: 0.95em;
        }
        
        /* 金币/积分显示 */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }
        
        .stat-box {
            background: linear-gradient(145deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            border-radius: 20px;
            padding: 15px 25px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            text-align: center;
            min-width: 100px;
        }
        
        .stat-label {
            font-size: 0.75em;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .stat-value {
            font-size: 1.5em;
            font-weight: 700;
            margin-top: 5px;
        }
        
        .coins { color: #ffd93d; }
        .streak { color: #ff6b6b; }
        
        /* 游戏模式选择 */
        .game-modes {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        
        .mode-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            border-radius: 16px;
            padding: 15px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }
        
        .mode-card:hover, .mode-card.active {
            border-color: #f5576c;
            background: linear-gradient(145deg, rgba(245,87,108,0.2), rgba(245,87,108,0.1));
            transform: translateY(-2px);
        }
        
        .mode-icon {
            font-size: 2em;
            margin-bottom: 5px;
        }
        
        .mode-name {
            font-weight: 600;
            font-size: 0.9em;
        }
        
        .mode-desc {
            font-size: 0.75em;
            color: rgba(255,255,255,0.5);
            margin-top: 3px;
        }
        
        /* 下注区域 */
        .bet-section {
            background: linear-gradient(145deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .bet-title {
            text-align: center;
            margin-bottom: 15px;
            font-weight: 600;
        }
        
        .bet-options {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .bet-btn {
            padding: 12px 20px;
            border: 2px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
            color: white;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            font-size: 0.9em;
        }
        
        .bet-btn:hover, .bet-btn.selected {
            background: #f5576c;
            border-color: #f5576c;
            transform: scale(1.05);
        }
        
        /* 骰子区域 */
        .dice-area {
            background: linear-gradient(145deg, rgba(0,0,0,0.3), rgba(0,0,0,0.1));
            border-radius: 24px;
            padding: 30px 20px;
            margin: 20px 0;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .dice-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            margin: 20px 0;
        }
        
        /* 3D 骰子 */
        .dice-3d {
            width: 80px;
            height: 80px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s;
        }
        
        .dice-3d.rolling {
            animation: roll3d 0.5s ease-out;
        }
        
        @keyframes roll3d {
            0% { transform: rotateX(0) rotateY(0) rotateZ(0); }
            25% { transform: rotateX(720deg) rotateY(360deg) rotateZ(180deg); }
            50% { transform: rotateX(1440deg) rotateY(720deg) rotateZ(360deg); }
            75% { transform: rotateX(1800deg) rotateY(1080deg) rotateZ(540deg); }
            100% { transform: rotateX(2160deg) rotateY(1440deg) rotateZ(720deg); }
        }
        
        .face {
            position: absolute;
            width: 80px;
            height: 80px;
            background: linear-gradient(145deg, #ffffff, #e0e0e0);
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 
                inset 0 0 15px rgba(0,0,0,0.1),
                0 0 20px rgba(0,0,0,0.2);
            border: 2px solid rgba(255,255,255,0.5);
        }
        
        .face:nth-child(1) { transform: translateZ(40px); }
        .face:nth-child(2) { transform: rotateY(180deg) translateZ(40px); }
        .face:nth-child(3) { transform: rotateY(90deg) translateZ(40px); }
        .face:nth-child(4) { transform: rotateY(-90deg) translateZ(40px); }
        .face:nth-child(5) { transform: rotateX(90deg) translateZ(40px); }
        .face:nth-child(6) { transform: rotateX(-90deg) translateZ(40px); }
        
        /* 骰子点数 */
        .dots {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            width: 60px;
            height: 60px;
            gap: 5px;
        }
        
        .dot {
            width: 14px;
            height: 14px;
            background: #333;
            border-radius: 50%;
            margin: auto;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }
        
        .dot.red {
            background: linear-gradient(145deg, #ff6b6b, #ee5a5a);
            box-shadow: 0 0 10px rgba(238, 90, 90, 0.5);
        }
        
        /* 点数布局 */
        .face[data-value="1"] .dot:nth-child(1) { grid-area: 2 / 2; width: 22px; height: 22px; }
        .face[data-value="1"] .dot:nth-child(1) { background: linear-gradient(145deg, #ff6b6b, #ee5a5a); }
        
        .face[data-value="2"] .dot:nth-child(1) { grid-area: 1 / 1; }
        .face[data-value="2"] .dot:nth-child(2) { grid-area: 3 / 3; }
        
        .face[data-value="3"] .dot:nth-child(1) { grid-area: 1 / 1; }
        .face[data-value="3"] .dot:nth-child(2) { grid-area: 2 / 2; }
        .face[data-value="3"] .dot:nth-child(3) { grid-area: 3 / 3; }
        
        .face[data-value="4"] .dot:nth-child(1) { grid-area: 1 / 1; }
        .face[data-value="4"] .dot:nth-child(2) { grid-area: 1 / 3; }
        .face[data-value="4"] .dot:nth-child(3) { grid-area: 3 / 1; }
        .face[data-value="4"] .dot:nth-child(4) { grid-area: 3 / 3; }
        
        .face[data-value="5"] .dot:nth-child(1) { grid-area: 1 / 1; }
        .face[data-value="5"] .dot:nth-child(2) { grid-area: 1 / 3; }
        .face[data-value="5"] .dot:nth-child(3) { grid-area: 2 / 2; }
        .face[data-value="5"] .dot:nth-child(4) { grid-area: 3 / 1; }
        .face[data-value="5"] .dot:nth-child(5) { grid-area: 3 / 3; }
        
        .face[data-value="6"] .dot:nth-child(1) { grid-area: 1 / 1; }
        .face[data-value="6"] .dot:nth-child(2) { grid-area: 1 / 3; }
        .face[data-value="6"] .dot:nth-child(3) { grid-area: 2 / 1; }
        .face[data-value="6"] .dot:nth-child(4) { grid-area: 2 / 3; }
        .face[data-value="6"] .dot:nth-child(5) { grid-area: 3 / 1; }
        .face[data-value="6"] .dot:nth-child(6) { grid-area: 3 / 3; }
        
        /* 结果显示 */
        .result-display {
            text-align: center;
            margin-top: 20px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s;
        }
        
        .result-display.show {
            opacity: 1;
            transform: translateY(0);
        }
        
        .result-total {
            font-size: 3em;
            font-weight: 800;
            background: linear-gradient(45deg, #ffd93d, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .result-text {
            font-size: 1.2em;
            margin-top: 10px;
            padding: 10px 20px;
            border-radius: 25px;
            display: inline-block;
        }
        
        .result-win {
            background: linear-gradient(145deg, rgba(0,255,136,0.2), rgba(0,255,136,0.1));
            color: #00ff88;
            border: 1px solid rgba(0,255,136,0.3);
        }
        
        .result-lose {
            background: linear-gradient(145deg, rgba(255,107,107,0.2), rgba(255,107,107,0.1));
            color: #ff6b6b;
            border: 1px solid rgba(255,107,107,0.3);
        }
        
        /* 主按钮 */
        .main-btn {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 18px 60px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.2em;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 
                0 10px 30px rgba(245, 87, 108, 0.4),
                0 0 60px rgba(245, 87, 108, 0.2);
            transition: all 0.3s;
            z-index: 100;
            letter-spacing: 2px;
        }
        
        .main-btn:hover {
            transform: translateX(-50%) translateY(-3px);
            box-shadow: 
                0 15px 40px rgba(245, 87, 108, 0.5),
                0 0 80px rgba(245, 87, 108, 0.3);
        }
        
        .main-btn:active {
            transform: translateX(-50%) scale(0.95);
        }
        
        .main-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        /* 连赢动画 */
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .win-streak {
            animation: pulse 1s infinite;
        }
        
        /* 历史记录 */
        .history-section {
            margin-top: 20px;
        }
        
        .history-title {
            font-size: 0.9em;
            color: rgba(255,255,255,0.5);
            margin-bottom: 10px;
            text-align: center;
        }
        
        .history-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
        }
        
        .history-item {
            padding: 8px 14px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            font-size: 0.85em;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .history-win { color: #00ff88; }
        .history-lose { color: #ff6b6b; }
        
        /* 说明文字 */
        .help-text {
            text-align: center;
            color: rgba(255,255,255,0.4);
            font-size: 0.8em;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="container">
        <div class="header">
            <h1>🎲 幸运骰子</h1>
            <div class="subtitle">测试你的运气，赢取金币！</div>
        </div>
        
        <div class="stats-bar">
            <div class="stat-box">
                <div class="stat-label">💰 金币</div>
                <div class="stat-value coins" id="coins">1000</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">🔥 连赢</div>
                <div class="stat-value streak" id="streak">0</div>
            </div>
        </div>
        
        <div class="game-modes">
            <div class="mode-card active" onclick="setMode('normal')">
                <div class="mode-icon">🎲</div>
                <div class="mode-name">经典模式</div>
                <div class="mode-desc">1-3个骰子</div>
            </div>
            <div class="mode-card" onclick="setMode('guess')">
                <div class="mode-icon">🎯</div>
                <div class="mode-name">猜大小</div>
                <div class="mode-desc">大(11+) vs 小(≤10)</div>
            </div>
            <div class="mode-card" onclick="setMode('odd_even')">
                <div class="mode-icon">⚡</div>
                <div class="mode-name">猜单双</div>
                <div class="mode-desc">单数 vs 双数</div>
            </div>
            <div class="mode-card" onclick="setMode('lucky')">
                <div class="mode-icon">🍀</div>
                <div class="mode-name">幸运7</div>
                <div class="mode-desc">猜中7点赢5倍</div>
            </div>
        </div>
        
        <div class="bet-section" id="betSection">
            <div class="bet-title">🎯 选择你的预测</div>
            <div class="bet-options" id="betOptions">
                <!-- 动态生成 -->
            </div>
        </div>
        
        <div class="dice-area">
            <div class="dice-container" id="diceContainer">
                <div class="dice-3d" id="dice1">
                    <div class="face" data-value="1"><div class="dots"><div class="dot"></div></div></div>
                    <div class="face" data-value="6"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>
                    <div class="face" data-value="3"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>
                    <div class="face" data-value="4"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>
                    <div class="face" data-value="5"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>
                    <div class="face" data-value="2"><div class="dots"><div class="dot"></div><div class="dot"></div></div></div>
                </div>
            </div>
            
            <div class="result-display" id="resultDisplay">
                <div class="result-total" id="resultTotal">0</div>
                <div class="result-text" id="resultText">准备开始</div>
            </div>
        </div>
        
        <div class="history-section">
            <div class="history-title">📜 最近10局</div>
            <div class="history-list" id="historyList"></div>
        </div>
        
        <div class="help-text">🎮 选择模式和预测，点击按钮开始</div>
    </div>
    
    <button class="main-btn" id="rollBtn" onclick="roll()">🎲 开始游戏</button>

    <script>
        // 初始化
        let tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        // 游戏状态
        let coins = parseInt(localStorage.getItem('diceCoins')) || 1000;
        let currentStreak = 0;
        let gameMode = 'normal';
        let selectedBet = null;
        let isRolling = false;
        let history = JSON.parse(localStorage.getItem('diceHistory')) || [];
        let numDice = 2;
        
        // 更新显示
        updateCoins();
        updateHistory();
        updateBetOptions();
        createParticles();
        
        // 创建背景粒子
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (10 + Math.random() * 10) + 's';
                container.appendChild(particle);
            }
        }
        
        // 设置游戏模式
        function setMode(mode) {
            if (isRolling) return;
            gameMode = mode;
            selectedBet = null;
            
            document.querySelectorAll('.mode-card').forEach(card => {
                card.classList.remove('active');
            });
            event.target.closest('.mode-card').classList.add('active');
            
            // 设置骰子数量
            switch(mode) {
                case 'normal': numDice = 2; break;
                case 'guess': numDice = 2; break;
                case 'odd_even': numDice = 2; break;
                case 'lucky': numDice = 2; break;
            }
            
            updateDiceDisplay();
            updateBetOptions();
            hideResult();
        }
        
        // 更新下注选项
        function updateBetOptions() {
            const container = document.getElementById('betOptions');
            container.innerHTML = '';
            
            switch(gameMode) {
                case 'normal':
                    container.innerHTML = '<div style="color:rgba(255,255,255,0.6)">经典模式无需预测，直接开始！</div>';
                    break;
                case 'guess':
                    container.innerHTML = `
                        <button class="bet-btn" onclick="selectBet('small')">📉 小 (≤10)</button>
                        <button class="bet-btn" onclick="selectBet('big')">📈 大 (11+)</button>
                    `;
                    break;
                case 'odd_even':
                    container.innerHTML = `
                        <button class="bet-btn" onclick="selectBet('odd')">🔴 单数</button>
                        <button class="bet-btn" onclick="selectBet('even')">🔵 双数</button>
                    `;
                    break;
                case 'lucky':
                    container.innerHTML = `
                        <button class="bet-btn" onclick="selectBet('7')">🎯 正好7点</button>
                        <button class="bet-btn" onclick="selectBet('not7')">❌ 不是7点</button>
                    `;
                    break;
            }
        }
        
        // 选择下注
        function selectBet(bet) {
            if (isRolling) return;
            selectedBet = bet;
            document.querySelectorAll('.bet-btn').forEach(btn => {
                btn.classList.remove('selected');
            });
            event.target.classList.add('selected');
        }
        
        // 更新骰子显示
        function updateDiceDisplay() {
            const container = document.getElementById('diceContainer');
            container.innerHTML = '';
            for (let i = 0; i < numDice; i++) {
                container.innerHTML += createDiceHTML(i + 1);
            }
        }
        
        function createDiceHTML(id) {
            return `
                <div class="dice-3d" id="dice${id}">
                    <div class="face" data-value="1"><div class="dots"><div class="dot"></div></div></div>
                    <div class="face" data-value="6"><div class="dots">${'<div class="dot"></div>'.repeat(6)}</div></div>
                    <div class="face" data-value="3"><div class="dots">${'<div class="dot"></div>'.repeat(3)}</div></div>
                    <div class="face" data-value="4"><div class="dots">${'<div class="dot"></div>'.repeat(4)}</div></div>
                    <div class="face" data-value="5"><div class="dots">${'<div class="dot"></div>'.repeat(5)}</div></div>
                    <div class="face" data-value="2"><div class="dots">${'<div class="dot"></div>'.repeat(2)}</div></div>
                </div>
            `;
        }
        
        // 摇骰子
        function roll() {
            if (isRolling) return;
            
            // 检查下注
            if ((gameMode !== 'normal') && !selectedBet) {
                showResult('请先选择预测！', false);
                return;
            }
            
            isRolling = true;
            document.getElementById('rollBtn').disabled = true;
            document.getElementById('rollBtn').textContent = '🎲 摇奖中...';
            hideResult();
            
            // 震动反馈
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('heavy');
            }
            
            // 动画
            const diceElements = document.querySelectorAll('.dice-3d');
            diceElements.forEach(dice => {
                dice.classList.add('rolling');
            });
            
            // 生成结果
            const results = [];
            for (let i = 0; i < numDice; i++) {
                results.push(Math.floor(Math.random() * 6) + 1);
            }
            const total = results.reduce((a, b) => a + b, 0);
            
            // 延迟显示结果
            setTimeout(() => {
                diceElements.forEach((dice, index) => {
                    dice.classList.remove('rolling');
                    dice.style.transform = getRotationForValue(results[index]);
                });
                
                handleResult(total, results);
                
                document.getElementById('rollBtn').disabled = false;
                document.getElementById('rollBtn').textContent = '🎲 再玩一次';
                isRolling = false;
            }, 600);
        }
        
        function getRotationForValue(value) {
            const rotations = {
                1: 'rotateX(0deg) rotateY(0deg)',
                6: 'rotateX(180deg) rotateY(0deg)',
                3: 'rotateX(0deg) rotateY(-90deg)',
                4: 'rotateX(0deg) rotateY(90deg)',
                5: 'rotateX(-90deg) rotateY(0deg)',
                2: 'rotateX(90deg) rotateY(0deg)'
            };
            return rotations[value];
        }
        
        // 处理结果
        function handleResult(total, results) {
            let win = false;
            let winAmount = 0;
            let message = '';
            
            switch(gameMode) {
                case 'normal':
                    message = `点数: ${results.join('+')} = ${total}`;
                    if (total >= 10) {
                        win = true;
                        winAmount = 100;
                        message += ' 🎉 大奖！';
                    } else if (total >= 7) {
                        win = true;
                        winAmount = 50;
                        message += ' 👍 不错！';
                    } else {
                        message += ' 💪 再接再厉！';
                    }
                    break;
                    
                case 'guess':
                    const isBig = total >= 11;
                    const predictedBig = selectedBet === 'big';
                    win = (isBig && predictedBig) || (!isBig && !predictedBig);
                    winAmount = win ? 200 : 0;
                    message = win ? `🎉 猜对了！${total}点是${isBig ? '大' : '小'}` : `😅 猜错了！${total}点是${isBig ? '大' : '小'}`;
                    break;
                    
                case 'odd_even':
                    const isOdd = total % 2 === 1;
                    const predictedOdd = selectedBet === 'odd';
                    win = (isOdd && predictedOdd) || (!isOdd && !predictedOdd);
                    winAmount = win ? 200 : 0;
                    message = win ? `🎉 猜对了！${total}是${isOdd ? '单' : '双'}数` : `😅 猜错了！${total}是${isOdd ? '单' : '双'}数`;
                    break;
                    
                case 'lucky':
                    const isSeven = total === 7;
                    const predictedSeven = selectedBet === '7';
                    win = (isSeven && predictedSeven) || (!isSeven && !predictedSeven);
                    winAmount = win ? (isSeven ? 500 : 100) : 0;
                    message = isSeven && win ? '🎉🎉🎉 中了7点！大奖！' : (win ? '👍 猜对了！' : '😅 猜错了！');
                    break;
            }
            
            // 更新金币
            if (win) {
                coins += winAmount;
                currentStreak++;
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            } else {
                coins = Math.max(0, coins - 50);
                currentStreak = 0;
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
            }
            
            // 保存
            localStorage.setItem('diceCoins', coins);
            updateCoins();
            
            // 显示结果
            showResult(message, win, total);
            
            // 添加到历史
            addToHistory(total, win);
        }
        
        function showResult(text, win, total) {
            const display = document.getElementById('resultDisplay');
            const resultText = document.getElementById('resultText');
            const resultTotal = document.getElementById('resultTotal');
            
            resultTotal.textContent = total || '?';
            resultText.textContent = text;
            resultText.className = 'result-text ' + (win ? 'result-win' : 'result-lose');
            
            display.classList.add('show');
        }
        
        function hideResult() {
            document.getElementById('resultDisplay').classList.remove('show');
        }
        
        function updateCoins() {
            document.getElementById('coins').textContent = coins;
            document.getElementById('streak').textContent = currentStreak;
        }
        
        function addToHistory(total, win) {
            history.unshift({ total, win, time: Date.now() });
            if (history.length > 10) history.pop();
            localStorage.setItem('diceHistory', JSON.stringify(history));
            updateHistory();
        }
        
        function updateHistory() {
            const container = document.getElementById('historyList');
            container.innerHTML = history.map(h => 
                `<div class="history-item ${h.win ? 'history-win' : 'history-lose'}">${h.total}${h.win ? '✓' : '✗'}</div>`
            ).join('');
        }
        
        // 初始化骰子显示
        updateDiceDisplay();
    </script>
</body>
</html>
