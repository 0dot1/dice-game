<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎲 骰盅游戏</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            min-height: 100vh;
            background: linear-gradient(180deg, #1a0f2e 0%, #0d0514 100%);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            color: white;
            padding-bottom: 100px;
        }
        
        .container {
            max-width: 400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            padding: 10px 0;
        }
        
        .header h1 {
            font-size: 1.8em;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255,215,0,0.5);
        }
        
        .settings {
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 15px;
            margin: 15px 0;
        }
        
        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0;
        }
        
        .setting-label {
            font-size: 0.9em;
            color: rgba(255,255,255,0.8);
        }
        
        .dice-btns {
            display: flex;
            gap: 8px;
        }
        
        .dice-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid rgba(255,215,0,0.5);
            background: transparent;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        
        .dice-btn.active {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border-color: #ffd700;
            color: #1a0f2e;
        }
        
        .toggle {
            width: 50px;
            height: 28px;
            background: rgba(255,255,255,0.2);
            border-radius: 14px;
            position: relative;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .toggle.on {
            background: #00d26a;
        }
        
        .toggle::after {
            content: '';
            position: absolute;
            width: 24px;
            height: 24px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: 0.3s;
        }
        
        .toggle.on::after {
            left: 24px;
        }
        
        .table {
            background: linear-gradient(145deg, #8b4513, #654321);
            border-radius: 20px;
            padding: 40px 20px;
            margin: 20px 0;
            position: relative;
            min-height: 280px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 0 100px rgba(0,0,0,0.3);
        }
        
        .game-area {
            position: relative;
            width: 200px;
            height: 180px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .dice-box {
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            max-width: 180px;
            position: relative;
            z-index: 1;
        }
        
        .dice {
            width: 45px;
            height: 45px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.3), inset 0 -2px 5px rgba(0,0,0,0.1);
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            padding: 4px;
            transition: all 0.3s;
        }
        
        .dice-dot {
            width: 8px;
            height: 8px;
            background: #333;
            border-radius: 50%;
            margin: auto;
        }
        
        .dice[data-value="1"] .dice-dot:nth-child(1) { grid-area: 2/2; width: 14px; height: 14px; background: #e74c3c; }
        .dice[data-value="2"] .dice-dot:nth-child(1) { grid-area: 1/1; }
        .dice[data-value="2"] .dice-dot:nth-child(2) { grid-area: 3/3; }
        .dice[data-value="3"] .dice-dot:nth-child(1) { grid-area: 1/1; }
        .dice[data-value="3"] .dice-dot:nth-child(2) { grid-area: 2/2; }
        .dice[data-value="3"] .dice-dot:nth-child(3) { grid-area: 3/3; }
        .dice[data-value="4"] .dice-dot:nth-child(1) { grid-area: 1/1; }
        .dice[data-value="4"] .dice-dot:nth-child(2) { grid-area: 1/3; }
        .dice[data-value="4"] .dice-dot:nth-child(3) { grid-area: 3/1; }
        .dice[data-value="4"] .dice-dot:nth-child(4) { grid-area: 3/3; }
        .dice[data-value="5"] .dice-dot:nth-child(1) { grid-area: 1/1; }
        .dice[data-value="5"] .dice-dot:nth-child(2) { grid-area: 1/3; }
        .dice[data-value="5"] .dice-dot:nth-child(3) { grid-area: 2/2; }
        .dice[data-value="5"] .dice-dot:nth-child(4) { grid-area: 3/1; }
        .dice[data-value="5"] .dice-dot:nth-child(5) { grid-area: 3/3; }
        .dice[data-value="6"] .dice-dot:nth-child(1) { grid-area: 1/1; }
        .dice[data-value="6"] .dice-dot:nth-child(2) { grid-area: 1/3; }
        .dice[data-value="6"] .dice-dot:nth-child(3) { grid-area: 2/1; }
        .dice[data-value="6"] .dice-dot:nth-child(4) { grid-area: 2/3; }
        .dice[data-value="6"] .dice-dot:nth-child(5) { grid-area: 3/1; }
        .dice[data-value="6"] .dice-dot:nth-child(6) { grid-area: 3/3; }
        
        .cup {
            position: absolute;
            width: 180px;
            height: 140px;
            z-index: 10;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        
        .cup.shaking {
            animation: cupShake 0.12s infinite;
        }
        
        @keyframes cupShake {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(-3px, -5px) rotate(-3deg); }
            50% { transform: translate(3px, -3px) rotate(3deg); }
            75% { transform: translate(-2px, -6px) rotate(-2deg); }
        }
        
        .cup.open {
            transform: translateY(-200px) translateX(50px) rotate(30deg);
            opacity: 0.95;
        }
        
        .cup-body {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #c0c0c0 0%, #808080 50%, #404040 100%);
            border-radius: 50% 50% 40% 40%;
            position: relative;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5), inset 0 -8px 15px rgba(0,0,0,0.3), inset 0 8px 15px rgba(255,255,255,0.2);
        }
        
        .cup-top {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 90px;
            height: 35px;
            background: linear-gradient(135deg, #ffd700, #b8860b);
            border-radius: 50%;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }
        
        .cup-handle {
            position: absolute;
            right: -25px;
            top: 50%;
            transform: translateY(-50%);
            width: 45px;
            height: 70px;
            border: 10px solid #696969;
            border-left: none;
            border-radius: 0 35px 35px 0;
        }
        
        .cup-ring {
            position: absolute;
            left: 5%;
            right: 5%;
            height: 12px;
            background: linear-gradient(90deg, #b8860b, #ffd700, #b8860b);
            border-radius: 6px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        
        .cup-ring.top { top: 25%; }
        .cup-ring.bottom { bottom: 25%; }
        
        .hint {
            text-align: center;
            color: rgba(255,255,255,0.7);
            margin-top: 20px;
            font-size: 0.95em;
            min-height: 24px;
        }
        
        .hint.blink {
            animation: blink 1s infinite;
            color: #ffd700;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .result {
            text-align: center;
            margin-top: 15px;
            opacity: 0;
            transition: 0.5s;
        }
        
        .result.show {
            opacity: 1;
        }
        
        .result-num {
            font-size: 2.5em;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255,215,0,0.5);
        }
        
        .result-text {
            color: rgba(255,255,255,0.8);
            margin-top: 5px;
        }
        
        .main-btn {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            padding: 18px 60px;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #1a0f2e;
            border: none;
            border-radius: 30px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255,215,0,0.4);
            z-index: 100;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎲 骰盅游戏</h1>
        </div>
        
        <div class="settings">
            <div class="setting-row">
                <span class="setting-label">🎲 骰子数量</span>
                <div class="dice-btns">
                    <button class="dice-btn" onclick="setDice(1)">1</button>
                    <button class="dice-btn active" onclick="setDice(2)">2</button>
                    <button class="dice-btn" onclick="setDice(3)">3</button>
                    <button class="dice-btn" onclick="setDice(4)">4</button>
                    <button class="dice-btn" onclick="setDice(5)">5</button>
                </div>
            </div>
            <div class="setting-row">
                <span class="setting-label">🤖 自动开盅</span>
                <div class="toggle" id="autoToggle" onclick="toggleAuto()"></div>
            </div>
        </div>
        
        <div class="table">
            <div class="game-area">
                <div class="dice-box" id="diceBox"></div>
                
                <div class="cup" id="cup" onclick="clickCup()">
                    <div class="cup-body">
                        <div class="cup-top"></div>
                        <div class="cup-handle"></div>
                        <div class="cup-ring top"></div>
                        <div class="cup-ring bottom"></div>
                    </div>
                </div>
            </div>
            
            <div class="hint" id="hint">点击「摇一摇」开始</div>
            
            <div class="result" id="result">
                <div class="result-num" id="resultNum">-</div>
                <div class="result-text" id="resultText"></div>
            </div>
        </div>
    </div>
    
    <button class="main-btn" id="mainBtn" onclick="mainAction()">🎲 摇一摇</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        let numDice = 2;
        let isShaking = false;
        let isOpen = false;
        let autoOpen = false;
        let results = [];
        
        function setDice(n) {
            if (isShaking) return;
            numDice = n;
            document.querySelectorAll('.dice-btn').forEach((btn, i) => {
                btn.classList.toggle('active', i === n - 1);
            });
            initDice();
            reset();
        }
        
        function toggleAuto() {
            autoOpen = !autoOpen;
            document.getElementById('autoToggle').classList.toggle('on', autoOpen);
        }
        
        function initDice() {
            const box = document.getElementById('diceBox');
            box.innerHTML = '';
            for (let i = 0; i < 5; i++) {
                const dice = document.createElement('div');
                dice.className = 'dice';
                dice.style.display = i < numDice ? 'grid' : 'none';
                dice.style.opacity = '0';
                dice.id = 'dice' + i;
                dice.innerHTML = '<div class="dice-dot"></div>';
                dice.setAttribute('data-value', '1');
                box.appendChild(dice);
            }
        }
        
        function mainAction() {
            if (isShaking) {
                stopShake();
            } else if (isOpen) {
                reset();
                setTimeout(startShake, 200);
            } else {
                startShake();
            }
        }
        
        function startShake() {
            isShaking = true;
            isOpen = false;
            
            document.getElementById('cup').classList.remove('open');
            document.getElementById('cup').classList.add('shaking');
            
            document.getElementById('mainBtn').textContent = '⏹ 停止';
            document.getElementById('hint').textContent = '骰盅摇晃中...点击停止';
            document.getElementById('hint').classList.add('blink');
            document.getElementById('result').classList.remove('show');
            
            document.querySelectorAll('.dice').forEach(d => d.style.opacity = '0');
            
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            
            setTimeout(() => { if (isShaking) stopShake(); }, 2500);
        }
        
        function stopShake() {
            if (!isShaking) return;
            isShaking = false;
            
            document.getElementById('cup').classList.remove('shaking');
            
            results = [];
            for (let i = 0; i < numDice; i++) {
                const val = Math.floor(Math.random() * 6) + 1;
                results.push(val);
                const dice = document.getElementById('dice' + i);
                dice.setAttribute('data-value', val);
                dice.innerHTML = Array(val).fill('<div class="dice-dot"></div>').join('');
                dice.style.opacity = '0';
            }
            
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('heavy');
            
            document.getElementById('mainBtn').textContent = '🎲 再摇一次';
            
            if (autoOpen) {
                setTimeout(openCup, 400);
            } else {
                document.getElementById('hint').textContent = '👆 点击骰盅掀开看结果';
                document.getElementById('hint').classList.remove('blink');
            }
        }
        
        function clickCup() {
            if (isShaking) {
                stopShake();
            } else if (results.length > 0 && !isOpen) {
                openCup();
            }
        }
        
        function openCup() {
            isOpen = true;
            document.getElementById('cup').classList.add('open');
            
            document.querySelectorAll('.dice').forEach((d, i) => {
                if (i < numDice) d.style.opacity = '1';
            });
            
            const total = results.reduce((a, b) => a + b, 0);
            document.getElementById('resultNum').textContent = total + '点';
            
            let text = results.join('+') + '=' + total;
            const max = numDice * 6;
            if (total >= max * 0.8) text += ' 🔥 运气爆棚!';
            else if (total >= max * 0.6) text += ' ✨ 手气不错!';
            else if (total >= max * 0.4) text += ' 👍 还可以';
            else text += ' 💪 再接再厉';
            
            document.getElementById('resultText').textContent = text;
            document.getElementById('result').classList.add('show');
            document.getElementById('hint').textContent = '掀开成功！再摇一次？';
            
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        }
        
        function reset() {
            isShaking = false;
            isOpen = false;
            results = [];
            document.getElementById('cup').classList.remove('shaking', 'open');
            document.getElementById('mainBtn').textContent = '🎲 摇一摇';
            document.getElementById('hint').textContent = '点击「摇一摇」开始';
            document.getElementById('hint').classList.remove('blink');
            document.getElementById('result').classList.remove('show');
            document.querySelectorAll('.dice').forEach(d => d.style.opacity = '0');
        }
        
        initDice();
    </script>
</body>
</html>
