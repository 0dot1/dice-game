<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎲 摇骰子</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            min-height: 100vh;
            background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            color: white;
            padding: 20px;
            padding-bottom: 100px;
        }
        
        .container {
            max-width: 400px;
            margin: 0 auto;
        }
        
        /* 标题 */
        .title {
            text-align: center;
            padding: 20px 0;
        }
        
        .title h1 {
            font-size: 2em;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }
        
        /* 设置 */
        .settings {
            background: rgba(255,255,255,0.15);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 20px;
        }
        
        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0;
        }
        
        .setting-label {
            font-size: 0.9em;
        }
        
        .dice-selector {
            display: flex;
            gap: 8px;
        }
        
        .dice-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.5);
            background: transparent;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .dice-btn.active {
            background: #ffd700;
            border-color: #ffd700;
            color: #333;
        }
        
        .toggle {
            width: 50px;
            height: 28px;
            background: rgba(255,255,255,0.3);
            border-radius: 14px;
            position: relative;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .toggle.on {
            background: #00d26a;
        }
        
        .toggle::after {
            content: '';
            position: absolute;
            width: 24px;
            height: 24px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: 0.3s;
        }
        
        .toggle.on::after {
            left: 24px;
        }
        
        /* 游戏区域 */
        .game-box {
            background: linear-gradient(145deg, #2d1b4e, #1a0f2e);
            border-radius: 24px;
            padding: 30px 20px;
            text-align: center;
            min-height: 300px;
            position: relative;
        }
        
        /* 骰盅容器 */
        .cup-wrapper {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto;
        }
        
        /* 骰子容器 - 始终可见区域 */
        .dice-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 160px;
            height: 120px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 10px;
            z-index: 5;
        }
        
        /* 骰子 */
        .dice {
            width: 45px;
            height: 45px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            padding: 4px;
            opacity: 0;
            transition: opacity 0.5s, transform 0.3s;
        }
        
        .dice.show {
            opacity: 1;
        }
        
        .dot {
            width: 8px;
            height: 8px;
            background: #333;
            border-radius: 50%;
            margin: auto;
        }
        
        .dot.red {
            background: #e74c3c;
            box-shadow: 0 0 5px rgba(231,76,60,0.5);
        }
        
        /* 点数布局 */
        .dice[data-value="1"] .dot:nth-child(1) { grid-area: 2/2; width: 14px; height: 14px; background: #e74c3c; }
        .dice[data-value="2"] .dot:nth-child(1) { grid-area: 1/1; }
        .dice[data-value="2"] .dot:nth-child(2) { grid-area: 3/3; }
        .dice[data-value="3"] .dot:nth-child(1) { grid-area: 1/1; }
        .dice[data-value="3"] .dot:nth-child(2) { grid-area: 2/2; }
        .dice[data-value="3"] .dot:nth-child(3) { grid-area: 3/3; }
        .dice[data-value="4"] .dot:nth-child(1) { grid-area: 1/1; }
        .dice[data-value="4"] .dot:nth-child(2) { grid-area: 1/3; }
        .dice[data-value="4"] .dot:nth-child(3) { grid-area: 3/1; }
        .dice[data-value="4"] .dot:nth-child(4) { grid-area: 3/3; }
        .dice[data-value="5"] .dot:nth-child(1) { grid-area: 1/1; }
        .dice[data-value="5"] .dot:nth-child(2) { grid-area: 1/3; }
        .dice[data-value="5"] .dot:nth-child(3) { grid-area: 2/2; }
        .dice[data-value="5"] .dot:nth-child(4) { grid-area: 3/1; }
        .dice[data-value="5"] .dot:nth-child(5) { grid-area: 3/3; }
        .dice[data-value="6"] .dot:nth-child(1) { grid-area: 1/1; }
        .dice[data-value="6"] .dot:nth-child(2) { grid-area: 1/3; }
        .dice[data-value="6"] .dot:nth-child(3) { grid-area: 2/1; }
        .dice[data-value="6"] .dot:nth-child(4) { grid-area: 2/3; }
        .dice[data-value="6"] .dot:nth-child(5) { grid-area: 3/1; }
        .dice[data-value="6"] .dot:nth-child(6) { grid-area: 3/3; }
        
        /* 直筒圆形骰盅 - 倒扣样式 */
        .cup {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%) rotate(180deg);
            width: 140px;
            height: 180px;
            z-index: 10;
            cursor: pointer;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .cup.shaking {
            animation: shake 0.15s infinite;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(-50%) rotate(180deg) rotate(0deg); }
            25% { transform: translateX(calc(-50% - 5px)) rotate(180deg) rotate(-5deg); }
            75% { transform: translateX(calc(-50% + 5px)) rotate(180deg) rotate(5deg); }
        }
        
        .cup.open {
            transform: translateX(-50%) translateY(-220px) rotate(160deg);
            opacity: 0.9;
        }
        
        /* 杯身 - 直筒圆形 */
        .cup-body {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, 
                #c0c0c0 0%, 
                #e8e8e8 20%, 
                #f5f5f5 35%,
                #e0e0e0 50%, 
                #a0a0a0 70%, 
                #808080 85%,
                #606060 100%);
            border-radius: 10px 10px 50% 50%;
            position: relative;
            box-shadow: 
                0 15px 30px rgba(0,0,0,0.4),
                inset -10px 0 20px rgba(0,0,0,0.2),
                inset 10px 0 20px rgba(255,255,255,0.3);
        }
        
        /* 杯口 */
        .cup-rim {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 30px;
            background: linear-gradient(90deg, #b8860b, #ffd700, #ffed4e, #ffd700, #b8860b);
            border-radius: 50%;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        /* 杯底 */
        .cup-bottom {
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 130px;
            height: 25px;
            background: linear-gradient(90deg, #808080, #a0a0a0, #808080);
            border-radius: 50%;
        }
        
        /* 状态文字 */
        .status {
            margin-top: 20px;
            font-size: 1em;
            color: rgba(255,255,255,0.8);
            min-height: 24px;
        }
        
        .status.blink {
            animation: blink 1s infinite;
            color: #ffd700;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* 结果 */
        .result {
            margin-top: 15px;
            opacity: 0;
            transition: 0.5s;
        }
        
        .result.show {
            opacity: 1;
        }
        
        .result-num {
            font-size: 2.5em;
            font-weight: bold;
            color: #ffd700;
        }
        
        .result-detail {
            color: rgba(255,255,255,0.7);
            margin-top: 5px;
        }
        
        /* 主按钮 */
        .main-btn {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            padding: 16px 50px;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #333;
            border: none;
            border-radius: 30px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(255,215,0,0.4);
            z-index: 100;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">
            <h1>🎲 摇骰子</h1>
        </div>
        
        <div class="settings">
            <div class="setting-row">
                <span class="setting-label">🎲 骰子数量</span>
                <div class="dice-selector">
                    <button class="dice-btn" onclick="setDiceCount(1)">1</button>
                    <button class="dice-btn active" onclick="setDiceCount(2)">2</button>
                    <button class="dice-btn" onclick="setDiceCount(3)">3</button>
                    <button class="dice-btn" onclick="setDiceCount(4)">4</button>
                    <button class="dice-btn" onclick="setDiceCount(5)">5</button>
                </div>
            </div>
            <div class="setting-row">
                <span class="setting-label">🤖 自动开盅</span>
                <div class="toggle" id="autoToggle" onclick="toggleAuto()"></div>
            </div>
        </div>
        
        <div class="game-box">
            <div class="cup-wrapper">
                <!-- 骰子容器 -->
                <div class="dice-container" id="diceContainer"></div>
                
                <!-- 骰盅 -->
                <div class="cup" id="cup" onclick="clickCup()">
                    <div class="cup-rim"></div>
                    <div class="cup-body"></div>
                    <div class="cup-bottom"></div>
                </div>
            </div>
            
            <div class="status" id="status">点击「摇一摇」开始</div>
            
            <div class="result" id="result">
                <div class="result-num" id="resultNum">-</div>
                <div class="result-detail" id="resultDetail"></div>
            </div>
        </div>
    </div>
    
    <button class="main-btn" id="mainBtn" onclick="mainAction()">🎲 摇一摇</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        let numDice = 2;
        let isShaking = false;
        let isOpen = false;
        let autoOpen = false;
        let results = [];
        
        // 设置骰子数量
        function setDiceCount(n) {
            if (isShaking) return;
            numDice = n;
            document.querySelectorAll('.dice-btn').forEach((btn, i) => {
                btn.classList.toggle('active', i === n - 1);
            });
            createDice();
            reset();
        }
        
        // 切换自动开盅
        function toggleAuto() {
            autoOpen = !autoOpen;
            document.getElementById('autoToggle').classList.toggle('on', autoOpen);
        }
        
        // 创建骰子
        function createDice() {
            const container = document.getElementById('diceContainer');
            container.innerHTML = '';
            
            for (let i = 0; i < numDice; i++) {
                const dice = document.createElement('div');
                dice.className = 'dice';
                dice.id = 'dice' + i;
                dice.innerHTML = '<div class="dot"></div>';
                dice.setAttribute('data-value', '1');
                container.appendChild(dice);
            }
        }
        
        // 主按钮动作
        function mainAction() {
            if (isShaking) {
                stopShake();
            } else if (isOpen) {
                reset();
                setTimeout(startShake, 200);
            } else {
                startShake();
            }
        }
        
        // 开始摇晃
        function startShake() {
            isShaking = true;
            isOpen = false;
            results = [];
            
            // 关闭骰盅
            document.getElementById('cup').classList.remove('open');
            document.getElementById('cup').classList.add('shaking');
            
            // 隐藏所有骰子
            for (let i = 0; i < numDice; i++) {
                const dice = document.getElementById('dice' + i);
                if (dice) {
                    dice.classList.remove('show');
                    dice.style.opacity = '0';
                }
            }
            
            document.getElementById('mainBtn').textContent = '⏹ 停止';
            document.getElementById('status').textContent = '🎲 摇晃中...点击停止';
            document.getElementById('status').classList.add('blink');
            document.getElementById('result').classList.remove('show');
            
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            
            // 3秒后自动停止
            setTimeout(() => {
                if (isShaking) stopShake();
            }, 2500);
        }
        
        // 停止摇晃
        function stopShake() {
            if (!isShaking) return;
            isShaking = false;
            
            document.getElementById('cup').classList.remove('shaking');
            
            // 生成随机结果
            for (let i = 0; i < numDice; i++) {
                const value = Math.floor(Math.random() * 6) + 1;
                results.push(value);
                
                const dice = document.getElementById('dice' + i);
                if (dice) {
                    dice.setAttribute('data-value', value);
                    dice.innerHTML = Array(value).fill('<div class="dot"></div>').join('');
                }
            }
            
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('heavy');
            
            document.getElementById('mainBtn').textContent = '🎲 再摇一次';
            
            if (autoOpen) {
                setTimeout(openCup, 400);
            } else {
                document.getElementById('status').textContent = '👆 点击骰盅看结果';
                document.getElementById('status').classList.remove('blink');
            }
        }
        
        // 点击骰盅
        function clickCup() {
            if (isShaking) {
                stopShake();
            } else if (!isOpen && results.length > 0) {
                openCup();
            }
        }
        
        // 开盅
        function openCup() {
            isOpen = true;
            document.getElementById('cup').classList.add('open');
            
            // 逐个显示骰子
            for (let i = 0; i < numDice; i++) {
                setTimeout(() => {
                    const dice = document.getElementById('dice' + i);
                    if (dice) {
                        dice.style.opacity = '1';
                        dice.classList.add('show');
                    }
                }, i * 150);
            }
            
            // 显示结果
            const total = results.reduce((a, b) => a + b, 0);
            const max = numDice * 6;
            
            document.getElementById('resultNum').textContent = total + ' 点';
            
            let detail = results.join(' + ') + ' = ' + total;
            const ratio = total / max;
            if (ratio >= 0.8) detail += ' 🔥 运气爆棚!';
            else if (ratio >= 0.6) detail += ' ✨ 不错哦!';
            else if (ratio >= 0.4) detail += ' 👍 还可以';
            else detail += ' 💪 再接再厉';
            
            document.getElementById('resultDetail').textContent = detail;
            document.getElementById('result').classList.add('show');
            document.getElementById('status').textContent = '掀开成功！再来一局？';
            
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        }
        
        // 重置
        function reset() {
            isShaking = false;
            isOpen = false;
            results = [];
            
            document.getElementById('cup').classList.remove('shaking', 'open');
            document.getElementById('mainBtn').textContent = '🎲 摇一摇';
            document.getElementById('status').textContent = '点击「摇一摇」开始';
            document.getElementById('status').classList.remove('blink');
            document.getElementById('result').classList.remove('show');
            
            // 隐藏所有骰子
            for (let i = 0; i < numDice; i++) {
                const dice = document.getElementById('dice' + i);
                if (dice) {
                    dice.classList.remove('show');
                    dice.style.opacity = '0';
                }
            }
        }
        
        // 初始化
        createDice();
    </script>
</body>
</html>
