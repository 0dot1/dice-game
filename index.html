<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎲 摇骰子</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        :root {
            --tg-theme-bg-color: #ffffff;
            --tg-theme-text-color: #000000;
            --tg-theme-button-color: #3390ec;
            --tg-theme-button-text-color: #ffffff;
            --tg-theme-secondary-bg-color: #f5f5f5;
        }
        
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%) !important;
            background-attachment: fixed !important;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            padding: 20px;
            padding-bottom: 120px;
            position: relative;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 80%, rgba(255,255,255,0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255,255,255,0.15) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(255,255,255,0.05) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
        
        .container {
            position: relative;
            z-index: 1;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
            z-index: 1;
        }
        
        .header h1 {
            color: white;
            font-size: 2.2em;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            font-weight: 800;
        }
        
        .header p {
            color: rgba(255,255,255,0.85);
            font-size: 1em;
            font-weight: 400;
        }
        
        .mode-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 40px;
            position: relative;
            z-index: 1;
            flex-wrap: wrap;
            padding: 0 10px;
        }
        
        .mode-btn {
            padding: 14px 22px;
            border: 2px solid rgba(255,255,255,0.5);
            background: rgba(255,255,255,0.1);
            color: white;
            border-radius: 30px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
            min-width: 50px;
        }
        
        .mode-btn.active {
            background: rgba(255,255,255,0.9);
            color: #764ba2;
            border-color: white;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        
        .dice-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin: 30px 0;
            min-height: 120px;
            flex-wrap: wrap;
            position: relative;
            z-index: 1;
            padding: 0 10px;
        }
        
        .dice {
            width: 90px;
            height: 90px;
            background: linear-gradient(145deg, #ffffff 0%, #f0f0f0 100%);
            border-radius: 20px;
            box-shadow: 
                0 8px 32px rgba(0,0,0,0.2),
                0 4px 16px rgba(0,0,0,0.1),
                inset 0 -4px 12px rgba(0,0,0,0.08),
                inset 0 4px 12px rgba(255,255,255,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            transition: transform 0.1s;
            flex-shrink: 0;
        }
        
        .dice.shaking {
            animation: shake 0.1s infinite;
        }
        
        @keyframes shake {
            0%, 100% { transform: rotate(0deg) translate(0, 0); }
            10% { transform: rotate(-10deg) translate(-2px, -2px); }
            20% { transform: rotate(10deg) translate(2px, 2px); }
            30% { transform: rotate(-10deg) translate(2px, -2px); }
            40% { transform: rotate(10deg) translate(-2px, 2px); }
            50% { transform: rotate(-5deg) translate(0, 0); }
            60% { transform: rotate(5deg) translate(2px, 0); }
            70% { transform: rotate(-5deg) translate(-2px, 0); }
            80% { transform: rotate(5deg) translate(0, 2px); }
            90% { transform: rotate(-5deg) translate(0, -2px); }
        }
        
        .dot {
            width: 16px;
            height: 16px;
            background: linear-gradient(145deg, #333 0%, #111 100%);
            border-radius: 50%;
            position: absolute;
            box-shadow: 
                inset 0 2px 4px rgba(255,255,255,0.2),
                0 2px 4px rgba(0,0,0,0.3);
        }
        
        .dice[data-value="1"] .dot:nth-child(1) { 
            top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 28px; height: 28px; 
            background: linear-gradient(145deg, #ff6b6b 0%, #ee5a5a 100%); 
            box-shadow: 
                inset 0 2px 6px rgba(255,255,255,0.3),
                0 4px 8px rgba(238, 90, 90, 0.4);
        }
        
        .dice[data-value="2"] .dot:nth-child(1) { top: 22%; left: 22%; transform: translate(-50%, -50%); }
        .dice[data-value="2"] .dot:nth-child(2) { bottom: 22%; right: 22%; transform: translate(50%, 50%); }
        
        .dice[data-value="3"] .dot:nth-child(1) { top: 22%; left: 22%; transform: translate(-50%, -50%); }
        .dice[data-value="3"] .dot:nth-child(2) { top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .dice[data-value="3"] .dot:nth-child(3) { bottom: 22%; right: 22%; transform: translate(50%, 50%); }
        
        .dice[data-value="4"] .dot:nth-child(1) { top: 22%; left: 22%; transform: translate(-50%, -50%); }
        .dice[data-value="4"] .dot:nth-child(2) { top: 22%; right: 22%; transform: translate(50%, -50%); }
        .dice[data-value="4"] .dot:nth-child(3) { bottom: 22%; left: 22%; transform: translate(-50%, 50%); }
        .dice[data-value="4"] .dot:nth-child(4) { bottom: 22%; right: 22%; transform: translate(50%, 50%); }
        
        .dice[data-value="5"] .dot:nth-child(1) { top: 22%; left: 22%; transform: translate(-50%, -50%); }
        .dice[data-value="5"] .dot:nth-child(2) { top: 22%; right: 22%; transform: translate(50%, -50%); }
        .dice[data-value="5"] .dot:nth-child(3) { top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .dice[data-value="5"] .dot:nth-child(4) { bottom: 22%; left: 22%; transform: translate(-50%, 50%); }
        .dice[data-value="5"] .dot:nth-child(5) { bottom: 22%; right: 22%; transform: translate(50%, 50%); }
        
        .dice[data-value="6"] .dot:nth-child(1) { top: 22%; left: 22%; transform: translate(-50%, -50%); }
        .dice[data-value="6"] .dot:nth-child(2) { top: 22%; right: 22%; transform: translate(50%, -50%); }
        .dice[data-value="6"] .dot:nth-child(3) { top: 50%; left: 22%; transform: translate(-50%, -50%); }
        .dice[data-value="6"] .dot:nth-child(4) { top: 50%; right: 22%; transform: translate(50%, -50%); }
        .dice[data-value="6"] .dot:nth-child(5) { bottom: 22%; left: 22%; transform: translate(-50%, 50%); }
        .dice[data-value="6"] .dot:nth-child(6) { bottom: 22%; right: 22%; transform: translate(50%, 50%); }
        
        .result-box {
            background: rgba(255,255,255,0.95);
            border-radius: 24px;
            padding: 30px;
            margin: 30px 0;
            text-align: center;
            box-shadow: 
                0 8px 32px rgba(0,0,0,0.2),
                0 2px 8px rgba(0,0,0,0.1);
            position: relative;
            z-index: 1;
            backdrop-filter: blur(10px);
        }
        
        .result-box .sum {
            font-size: 3.5em;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .result-box .comment {
            color: #666;
            margin-top: 15px;
            font-size: 1.3em;
            font-weight: 500;
        }
        
        .main-btn {
            position: fixed;
            bottom: 30px;
            left: 30px;
            right: 30px;
            padding: 22px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 1.3em;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 
                0 8px 32px rgba(245, 87, 108, 0.4),
                0 4px 16px rgba(0,0,0,0.2);
            transition: all 0.3s;
            z-index: 100;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .main-btn:active {
            transform: scale(0.98) translateY(2px);
            box-shadow: 
                0 4px 16px rgba(245, 87, 108, 0.3),
                0 2px 8px rgba(0,0,0,0.15);
        }
        
        .main-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .history {
            margin-top: 30px;
            position: relative;
            z-index: 1;
        }
        
        .history-title {
            color: rgba(255,255,255,0.9);
            font-size: 1em;
            margin-bottom: 15px;
            font-weight: 500;
        }
        
        .history-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .history-item {
            padding: 10px 18px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            font-size: 1em;
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            font-weight: 500;
        }
        
        .close-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 18px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 24px;
            color: white;
            font-size: 0.95em;
            cursor: pointer;
            z-index: 101;
            transition: all 0.3s;
        }
        
        .close-btn:active {
            background: rgba(255,255,255,0.3);
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <button class="close-btn" onclick="closeApp()">✕ 关闭</button>
    
    <div class="header">
        <h1>🎲 摇骰子</h1>
        <p>选择骰子数量，点击摇一摇</p>
    </div>
    
    <div class="mode-selector">
        <button class="mode-btn active" onclick="setMode(1)">1</button>
        <button class="mode-btn" onclick="setMode(2)">2</button>
        <button class="mode-btn" onclick="setMode(3)">3</button>
        <button class="mode-btn" onclick="setMode(4)">4</button>
        <button class="mode-btn" onclick="setMode(5)">5</button>
    </div>
    
    <div class="dice-container" id="diceContainer">
        <div class="dice" data-value="1">
            <div class="dot"></div>
        </div>
    </div>
    
    <div class="result-box" id="resultBox" style="display: none;">
        <div class="sum" id="sumResult">-</div>
        <div class="comment" id="comment"></div>
    </div>
    
    <div class="history">
        <div class="history-title">📜 最近记录</div>
        <div class="history-list" id="historyList"></div>
    </div>
    
    <button class="main-btn" id="rollBtn" onclick="rollDice()">
        🎲 摇一摇
    </button>

    <script>
        // 初始化 Telegram WebApp
        let tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        // 设置颜色主题
        document.documentElement.style.setProperty('--tg-theme-bg-color', tg.themeParams.bg_color || '#ffffff');
        document.documentElement.style.setProperty('--tg-theme-text-color', tg.themeParams.text_color || '#000000');
        document.documentElement.style.setProperty('--tg-theme-button-color', tg.themeParams.button_color || '#3390ec');
        document.documentElement.style.setProperty('--tg-theme-button-text-color', tg.themeParams.button_text_color || '#ffffff');
        document.documentElement.style.setProperty('--tg-theme-secondary-bg-color', tg.themeParams.secondary_bg_color || '#f5f5f5');
        
        let numDice = 1;
        let isRolling = false;
        let history = [];
        
        function closeApp() {
            tg.close();
        }
        
        function setMode(n) {
            if (isRolling) return;
            numDice = n;
            
            document.querySelectorAll('.mode-btn').forEach((btn, index) => {
                btn.classList.toggle('active', index === n - 1);
            });
            
            const container = document.getElementById('diceContainer');
            container.innerHTML = '';
            for (let i = 0; i < n; i++) {
                container.innerHTML += `
                    <div class="dice" data-value="1">
                        <div class="dot"></div>
                    </div>
                `;
            }
            
            document.getElementById('resultBox').style.display = 'none';
        }
        
        function createDots(value) {
            let dots = '';
            for (let i = 0; i < value; i++) {
                dots += '<div class="dot"></div>';
            }
            return dots;
        }
        
        function rollDice() {
            if (isRolling) return;
            isRolling = true;
            
            const btn = document.getElementById('rollBtn');
            const resultBox = document.getElementById('resultBox');
            const diceElements = document.querySelectorAll('.dice');
            
            btn.disabled = true;
            btn.textContent = '🎲 摇奖中...';
            resultBox.style.display = 'none';
            
            // 震动反馈
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('medium');
            }
            
            let rollCount = 0;
            const maxRolls = 12;
            
            const rollAnimation = setInterval(() => {
                diceElements.forEach(dice => {
                    dice.classList.add('shaking');
                    const randomValue = Math.floor(Math.random() * 6) + 1;
                    dice.setAttribute('data-value', randomValue);
                    dice.innerHTML = createDots(randomValue);
                });
                
                rollCount++;
                if (rollCount >= maxRolls) {
                    clearInterval(rollAnimation);
                    finalizeRoll();
                }
            }, 80);
            
            function finalizeRoll() {
                diceElements.forEach(dice => {
                    dice.classList.remove('shaking');
                });
                
                let total = 0;
                const results = [];
                
                diceElements.forEach(dice => {
                    const finalValue = Math.floor(Math.random() * 6) + 1;
                    dice.setAttribute('data-value', finalValue);
                    dice.innerHTML = createDots(finalValue);
                    total += finalValue;
                    results.push(finalValue);
                });
                
                // 显示结果
                const maxPossible = numDice * 6;
                const percentage = total / maxPossible;
                let comment = '';
                
                if (percentage >= 0.83) {
                    comment = '🔥 运气爆棚！';
                    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                } else if (percentage >= 0.67) {
                    comment = '✨ 手气不错！';
                } else if (percentage >= 0.5) {
                    comment = '👍 还可以~';
                } else if (percentage >= 0.33) {
                    comment = '😐 一般般';
                } else {
                    comment = '💪 再接再厉！';
                    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
                }
                
                document.getElementById('sumResult').textContent = total;
                document.getElementById('comment').textContent = 
                    `${results.join(' + ')} = ${total}  ${comment}`;
                resultBox.style.display = 'block';
                
                // 发送结果到 Telegram（可选）
                if (tg.sendData) {
                    tg.sendData(JSON.stringify({
                        action: 'dice_roll',
                        dice: numDice,
                        results: results,
                        total: total
                    }));
                }
                
                addToHistory(total, results);
                
                btn.disabled = false;
                btn.textContent = '🎲 再摇一次';
                isRolling = false;
            }
        }
        
        function addToHistory(total, results) {
            history.unshift({ total, results });
            if (history.length > 8) history.pop();
            
            const historyList = document.getElementById('historyList');
            historyList.innerHTML = history.map(h => 
                `<div class="history-item">${h.results.join('+')}=${h.total}</div>`
            ).join('');
        }
    </script>
</body>
</html>
